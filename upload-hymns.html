    const logEl = document.getElementById('log');
    const btn = document.getElementById('uploadBtn');

    function log(msg, type = '') {
      logEl.textContent += msg + '\n';
    }

    btn.addEventListener('click', async () => {
      btn.disabled = true;
      log(`Iniciando subida de ${hymns.length} himnos a colección "newHymns"...`);

      let successCount = 0;
      let errorCount = 0;

      for (let i = 0; i < hymns.length; i++) {
        try {
          await db.collection('newHymns').doc(`hymn_${hymns[i].edition2}`).set(hymns[i]);
          successCount++;
          if (successCount % 50 === 0) {
            log(`Subidos ${successCount}/${hymns.length}...`);
          }
        } catch (error) {
          errorCount++;
          log(`Error en himno ${i + 1}: ${error.message}`, 'error');
        }
      }

      log(`\n✅ Completado: ${successCount} himnos subidos`);
      if (errorCount > 0) {
        log(`❌ Errores: ${errorCount}`, 'error');
      }
      btn.disabled = false;
    });
