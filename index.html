<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HymnVS - Convert Hymn Numbers</title>
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="icon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="icon.svg">
  <meta name="theme-color" content="#6366f1">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="HymnVS">
  <link rel="stylesheet" href="styles.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎵</text></svg>">
</head>
<body>
  <div class="header-container"> 
    <h1 class="title">
      <svg class="title-icon" viewBox="0 0 24 24" fill="currentColor">
        <path d="M12 3v10.55c-.59-.34-1.27-.55-2-.55-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4V7h4V3h-6z"/>
      </svg>
      <span data-i18n="appName">HymnVS</span>
    </h1>
    <div class="header-controls">
      <button id="lang-toggle" class="lang-toggle" aria-label="Toggle language">ES</button>
      <button id="theme-toggle" class="theme-toggle" aria-label="Toggle theme">
        <svg id="sun-icon" class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/>
        </svg>
        <svg id="moon-icon" class="icon hidden" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/>
        </svg>
      </button>
      <button id="login-toggle" class="lang-toggle" aria-label="Login">
        <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/>
          <circle cx="12" cy="7" r="4"/>
        </svg>
      </button>
    </div>
  </div>

  <div id="user-display" class="user-display-top"></div>

  <div id="splash-screen" class="splash-screen">
    <div class="splash-logo">
      <div class="splash-icon-wrapper">
        <svg class="splash-icon" viewBox="0 0 24 24" fill="currentColor">
          <path d="M12 3v10.55c-.59-.34-1.27-.55-2-.55-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4V7h4V3h-6z"/>
        </svg>
      </div>
      <span class="splash-title">HymnVS</span>
    </div>
    <p class="splash-subtitle" data-i18n="loadingApp">Cargando App</p>
    <div class="splash-loader">
      <div class="splash-loader-bar"></div>
    </div>
  </div>

  <div class="container">
    <div class="card">
      <header class="header">
        <div class="header-top">
          <div class="title-wrapper">
            <p id="user-display" class="user-display"></p>
            <p class="subtitle" data-i18n="subtitle">Convert hymn numbers between editions</p>
          </div>
        </div>
      </header>

      <div class="tabs">
        <button class="tab-btn active" data-tab="convert" data-i18n="tabConvert">Convert</button>
        <button class="tab-btn" data-tab="add" data-i18n="tabAdd">Agregar</button>
      </div>

      <div id="tab-convert" class="tab-content">
        <div class="search-sections">
          <div class="search-section">
            <label for="edition2-input" class="label" data-i18n="labelEdition2">Edition 2</label>
            <div class="input-wrapper">
              <input
                type="text"
                inputmode="numeric"
                id="edition2-input"
                class="input"
                placeholder="Enter hymn number"
                data-i18n-placeholder="placeholder"
                pattern="[0-9]*"
              >
              <button type="button" id="clear-edition2" class="clear-btn" aria-label="Clear">&times;</button>
            </div>
          </div>

          <div class="search-section">
            <label for="edition1-input" class="label" data-i18n="labelEdition1">Edition 1</label>
            <div class="input-wrapper">
              <input
                type="text"
                inputmode="numeric"
                id="edition1-input"
                class="input"
                placeholder="Enter hymn number"
                data-i18n-placeholder="placeholder"
                pattern="[0-9]*"
              >
              <button type="button" id="clear-edition1" class="clear-btn" aria-label="Clear">&times;</button>
            </div>
          </div>
        </div>

        <div id="result" class="result-card hidden">
          <div class="result-row">
            <span class="result-label" data-i18n="resultEdition1">Edition 1:</span>
            <span id="result-edition1" class="result-value">--</span>
          </div>
          <div class="result-row">
            <span class="result-label" data-i18n="resultEdition2">Edition 2:</span>
            <span id="result-edition2" class="result-value">--</span>
          </div>
          <div class="result-row">
            <span class="result-label" data-i18n="sheetmusic">Sheetmusic:</span>
            <span id="sheetmusic" class="result-value">--</span>
          </div>
        </div>

        <div id="not-found" class="not-found hidden" data-i18n="notFound">
          Hymn not found
        </div>
      </div>

      <div id="tab-add" class="tab-content hidden">
        <form id="add-form" class="add-form">
          <div class="search-section">
            <label for="add-edition1" class="label" data-i18n="labelAddEdition1">Edition 1</label>
            <input type="number" id="add-edition1" class="input" data-i18n-placeholder="addEdition1Placeholder" placeholder="1" required>
          </div>
          <div class="search-section">
            <label for="add-edition2" class="label" data-i18n="labelAddEdition2">Edition 2</label>
            <input type="number" id="add-edition2" class="input" data-i18n-placeholder="addEdition2Placeholder" placeholder="1" required>
          </div>
          <div class="search-section">
            <label for="add-sheetmusic" class="label" data-i18n="labelAddSheetmusic">Sheetmusic</label>
            <input type="text" id="add-sheetmusic" class="input" data-i18n-placeholder="addSheetmusicPlaceholder" placeholder="Optional">
          </div>
          <button type="submit" class="submit-btn" data-i18n="btnAdd">Agregar</button>
        </form>
      </div>

      <div id="toast" class="toast hidden"></div>

      <div id="login-modal" class="modal hidden">
        <div class="modal-content">
          <h2 data-i18n="loginTitle">Iniciar Sesión</h2>
          <form id="login-form">
            <div class="search-section">
              <label for="login-user" data-i18n="loginUser">Usuario</label>
              <input type="text" id="login-user" class="input" required>
            </div>
            <div class="search-section">
              <label for="login-password" data-i18n="loginPassword">Contraseña</label>
              <input type="password" id="login-password" class="input" required>
            </div>
            <button type="submit" class="submit-btn" data-i18n="loginBtn">Entrar</button>
            <button type="button" id="close-login" class="text-btn" data-i18n="cancelBtn">Cancelar</button>
          </form>
        </div>
      </div>

      <div id="logout-modal" class="modal hidden">
        <div class="modal-content">
          <h2 data-i18n="logoutTitle">¿Cerrar sesión?</h2>
          <p data-i18n="logoutConfirm">¿Estás seguro que quieres cerrar sesión?</p>
          <button id="confirm-logout" class="submit-btn" data-i18n="logoutConfirmBtn">Sí, cerrar sesión</button>
          <button type="button" id="close-logout" class="text-btn" data-i18n="cancelBtn">Cancelar</button>
        </div>
      </div>
    </div>
  </div>
  <footer class="footer">
    <p>HymnVS - Hymn Number Converter v1.0.0</p>
  </footer>

  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
  <script src="script.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js');
    }
  </script>
</body>
</html>
